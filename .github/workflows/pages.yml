name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          echo "Node: $(node -v)"
          echo "npm: $(npm -v)"
          npm config set registry https://registry.npmjs.org/
          npm config set fetch-retries 5
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
          attempts=0
          until [ "$attempts" -ge 3 ]; do
            npm ci --no-audit --no-fund && break
            attempts=$((attempts + 1))
            echo "npm ci failed (attempt ${attempts}/3). Retrying..."
            sleep 15
          done
          if [ "$attempts" -ge 3 ]; then
            echo "npm ci failed after retries. Falling back to npm install."
            npm install --no-audit --no-fund
          fi

      - name: Check brand color drift
        run: npm run check:color-drift

      - name: Build with Next.js
        run: npm run build

      - name: Verify build output
        run: |
          echo "Verifying build output files..."
          ls -la out/ | head -20
          test -f out/index.html && echo "✓ index.html exists" || (echo "✗ index.html missing" && exit 1)
          test -f out/404.html && echo "✓ 404.html exists" || (echo "✗ 404.html missing - this will cause 404 errors" && exit 1)
          test -f out/CNAME && echo "✓ CNAME exists" || echo "⚠ CNAME missing (may be OK if not using custom domain)"
          test -f out/.nojekyll && echo "✓ .nojekyll exists" || echo "⚠ .nojekyll missing (will be created by postbuild script)"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

      - name: Check links (non-blocking)
        run: npm run check-links
        continue-on-error: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4 